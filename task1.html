    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        header {
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Controls Section */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 20px;
        }

        select {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .swap-icon {
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            padding: 5px;
        }

        .swap-icon:hover {
            color: var(--accent-color);
            transform: rotate(180deg);
        }

        /* Workspace Grid */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .swap-icon {
                text-align: center;
                transform: rotate(90deg);
            }
            .swap-icon:hover {
                transform: rotate(270deg);
            }
        }

        .box {
            position: relative;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            min-height: 220px;
        }

        .box:focus-within {
            border-color: rgba(99, 102, 241, 0.5);
        }

        textarea {
            width: 100%;
            height: 100%;
            min-height: 160px;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            padding: 16px;
            color: var(--text-primary);
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .output-text {
            padding: 16px;
            font-size: 1.05rem;
            line-height: 1.5;
            white-space: pre-wrap;

            flex-grow: 1;
            min-height: 160px;
        }

        .output-text.placeholder {
            color: var(--text-secondary);
        }

        /* Box Action Triggers */
        .box-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.2);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            transition: color 0.2s, background-color 0.2s;
        }

        .action-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Action Row */
        .action-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .translate-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 14px;

            font-size: 1.05rem;
            font-weight: 500;

        .translate-btn:hover {
            background: var(--accent-hover);

        .translate-btn:active {
            transform: scale(0.99);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        /* Loader Animation */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);

            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {

        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Language Translator</h1>
        <p>Translate text seamlessly across languages</p>
    </header>

    <div class="controls">
        <select id="sourceLang">
            <option value="autodetect">Auto-detect Language</option>
            <option value="en" selected>English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh">Mandarin (Chinese)</option>
            <option value="hi">Hindi</option>
            <option value="gu">Gujarati</option>
            <option value="ar">Arabic</option>
            <option value="ja">Japanese</option>
        </select>

        <div class="swap-icon" id="swapLanguages" title="Swap Languages">
            <i class="fa-solid to-arrow-right-left fa-arrows-rotate"></i>
        </div>

        <select id="targetLang">
            <option value="en">English</option>
            <option value="es" selected>Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh">Mandarin (Chinese)</option>
            <option value="hi">Hindi</option>
            <option value="gu">Gujarati</option>
            <option value="ar">Arabic</option>
            <option value="ja">Japanese</option>
        </select>
    </div>

    <div class="workspace">
        <div class="box">
            <textarea id="inputText" placeholder="Type or paste your text here..."></textarea>
            <div class="box-actions">
                <button class="action-btn" id="clearInput" title="Clear Text"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>

        <div class="box">
            <div id="outputText" class="output-text placeholder">Translation will appear here...</div>
            <div class="box-actions">
                <button class="action-btn" id="speakBtn" title="Listen / Text-to-Speech"><i class="fa-solid fa-volume-high"></i></button>
                <button class="action-btn" id="copyBtn" title="Copy to Clipboard"><i class="fa-solid fa-copy"></i></button>
            </div>
        </div>
    </div>

    <div class="action-row">
        <div class="error-message" id="errorMessage">An error occurred. Please try again.</div>
        <button class="translate-btn" id="translateBtn">
            <span class="spinner" id="btnSpinner"></span>
            <span id="btnText">Translate Text</span>
        </button>
    </div>
</div>

<script>
    // Elements Escalation
    const sourceLangSelect = document.getElementById('sourceLang');
    const targetLangSelect = document.getElementById('targetLang');
    const swapBtn = document.getElementById('swapLanguages');
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const translateBtn = document.getElementById('translateBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnText = document.getElementById('btnText');
    const errorMessage = document.getElementById('errorMessage');
    const copyBtn = document.getElementById('copyBtn');
    const speakBtn = document.getElementById('speakBtn');
    const clearInput = document.getElementById('clearInput');

    // --- Core Feature: Translation Logic ---
    async function performTranslation() {
        const text = inputText.value.trim();
        const source = sourceLangSelect.value;
        const target = targetLangSelect.value;

        // Validation Error Catching
        if (!text) {
            showError("Please enter some text to translate.");
            return;
        }
        
        if (source === target) {
            outputText.innerText = text;
            outputText.classList.remove('placeholder');
            hideError();
            return;
        }

        // Set UI Loading State
        setLoading(true);
        hideError();

        /* Using MyMemory Free Anonymous Translation API.
           Format: https://api.mymemory.translated.net/get?q=TEXT&langpair=SOURCE|TARGET
           
           NOTE FOR FUTURE SWAP: If you update to official Google Cloud Translation or 
           Microsoft Translator API down the road, swap this fetch URL block with your 
           respective bearer token headers and endpoint URLs.
        */
        const langPair = `${source === 'autodetect' ? 'auto' : source}|${target}`;
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("API request failure status.");
            
            const data = await response.json();
            
            if (data.responseData && data.responseData.translatedText) {
                outputText.innerText = data.responseData.translatedText;
                outputText.classList.remove('placeholder');
            } else {
                throw new Error("Invalid structure payload received.");
            }
        } catch (error) {
            console.error(error);
            showError("Translation failed. Check connection or retry shortly.");
            outputText.innerText = "Translation will appear here...";
            outputText.classList.add('placeholder');
        } finally {
            setLoading(false);
        }
    }

    // --- Helper UI States Management ---
    function setLoading(isLoading) {
        if (isLoading) {
            btnSpinner.style.display = "block";
            btnText.innerText = "Translating...";
            translateBtn.disabled = true;
            translateBtn.style.opacity = "0.7";
        } else {
            btnSpinner.style.display = "none";
            btnText.innerText = "Translate Text";
            translateBtn.disabled = false;
            translateBtn.style.opacity = "1";
        }
    }

    function showError(message) {
        errorMessage.innerText = message;
        errorMessage.style.display = "block";
    }

    function hideError() {
        errorMessage.style.display = "none";
    }

    // --- Usability Enhancement Features ---
    
    // Swap source and target dropdowns
    swapBtn.addEventListener('click', () => {
        const sourceVal = sourceLangSelect.value;
        const targetVal = targetLangSelect.value;
        
        // Prevent swapping auto-detect explicitly directly down into target
        if (sourceVal === 'autodetect') {
            alert("Cannot assign 'Auto-detect' as the output target language.");
            return;
        }
        
        sourceLangSelect.value = targetVal;
        targetLangSelect.value = sourceVal;
    });

    // Clear Text Inputs
    clearInput.addEventListener('click', () => {
        inputText.value = "";
        outputText.innerText = "Translation will appear here...";
        outputText.classList.add('placeholder');
        hideError();
    });

    // Copy Output to Clipboard
    copyBtn.addEventListener('click', () => {
        const translatedContent = outputText.innerText;
        if (outputText.classList.contains('placeholder') || !translatedContent) return;

        navigator.clipboard.writeText(translatedContent)
            .then(() => {
                const origIcon = copyBtn.innerHTML;
                copyBtn.innerHTML = `<i class="fa-solid fa-check" style="color: #22c55e;"></i>`;
                setTimeout(() => copyBtn.innerHTML = origIcon, 2000);
            })
            .catch(() => alert("Failed copying to clipboard."));
    });

    // Audio Output via Web Speech API
    speakBtn.addEventListener('click', () => {
        const textToSpeak = outputText.innerText;
        if (outputText.classList.contains('placeholder') || !textToSpeak) return;

        // Terminate any ongoing speech immediately before playing next audio instance
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = targetLangSelect.value; 
        
        window.speechSynthesis.speak(utterance);
    });

    // Core Button Bind Event
    translateBtn.addEventListener('click', performTranslation);
</script>
</body>
</html>
